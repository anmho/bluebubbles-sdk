        >Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // The message you want to edit the\
        \ selected message to\n    \"editedMessage\": \"This is the new message\"\
        ,\n    // The message to send to older iOS/macOS users\n    \"backwardsCompatibilityMessage\"\
        : \"Edited to \u201CThis is the new message\u201D\",\n    // The part of the\
        \ message to edit.\n    // macOS Big Sur and newer.\n    // Optional, defaults\
