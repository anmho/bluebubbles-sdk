  /api/v1/message/multipart:
    post:
      description: "<p>Send a multipart message</p>\n<h4 id=\"request-body\">Request\
        \ Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"><code\
        \ class=\"language-json\">{\n    // The GUID for the Chat you want this message\
        \ to be sent to\n    \"chatGuid\": \"iMessage;+;xxxxxxxxxxxx\",\n    // (Optional)\
        \ Send a subject with the message.\n    \"subject\": \"\",\n    // (Optional)\
        \ Send a message using an effect.\n    \"effectId\": \"\",\n    // (Optional)\
        \ Reply to another message by GUID.\n    \"selectedMessageGuid\": \"\",\n\
        \    // (Optional) The part of the message to reply to.\n    // This is only\
        \ used when replying to a specific part of a message\n    // Defaults to 0.\
        \ Must be an integer (min: 0)\n    \"partIndex\": 0,\n    // The list parts\
        \ of the multipart message.\n    // 1. Each part must be a dictionary\n  \
        \  // 2. Each part must have a partIndex\n    // 3. Each part must have either\
        \ a text or attachment\n    // 4. Each attachment part must have a name\n\
        \    // 5. Each attachment must have been uploaded prior using the /attachment/upload\
        \ endpoint\n    // 6. Each mention must have text\n    \"parts\": [\n    \
        \    {\n            \"partIndex\": 0,\n            \"text\": \"Hey, \"\n \
        \       },\n        {\n            \"partIndex\": 1,\n            \"text\"\
        : \"Tim Apple\",\n            \"mention\": \"tim@apple.com\"\n        },\n\
        \        {\n            \"partIndex\": 2,\n            \"text\": \" check\
        \ out these photos!\"\n        },\n        {\n            \"partIndex\": 3,\n\
        \            \"attachment\": \"&lt;Uploaded Attachment UUID&gt;\",\n     \
        \       \"name\": \"apple.jpg\"\n        },\n        {\n            \"partIndex\"\
        : 4,\n            \"attachment\": \"&lt;Uploaded Attachment UUID&gt;\",\n\
        \            \"name\": \"macbook.png\"\n        }\n    ]\n}\n\n</code></pre>\n"
      operationId: sendMultipartMessage
      requestBody:
        content:
          application/json:
            schema:
              example:
                chatGuid: iMessage;+;xxxxxxxxxxxx
                effectId: ''
                partIndex: 0
                parts:
                - partIndex: 0
                  text: 'Hey, '
                - mention: tim@apple.com
                  partIndex: 1
                  text: Tim Apple
                - partIndex: 2
                  text: ' check out these photos!'
                - attachment: <Uploaded Attachment UUID>
                  name: apple.jpg
                  partIndex: 3
                - attachment: <Uploaded Attachment UUID>
                  name: macbook.png
                  partIndex: 4
                selectedMessageGuid: ''
                subject: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Send Multipart Message
      tags:
      - messages
  /api/v1/message/query:
    post:
      description: "<p>Query for Messages from the database</p>\n<h4 id=\"request-body\"\
        >Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // (Optional) A number representing\
        \ the offset for the database query.\n    // This is useful for paging through\
        \ data from the database to make database calls return as quick as possible.\n\
        \    // (Default: 0)\n    \"limit\": 1000,\n    //( Optional) A number representing\
        \ the offset for the database query.\n    // This is useful for paging through\
        \ data from the database to make database calls return as quick as possible.\n\
        \    // (Default: 0)\n    \"offset\": 0,\n    // (Optional) What related information\
        \ do you want returned with the messages?\n    // Must be one of: `chat`,\
        \ `chat.participants`, `attachment`, `handle`, `sms`, `attributed-body`, `message-info-summary`,\
        \ `payload-data`\n    \"with\": [\n        \"chat\",\n        \"attachment\"\
        ,\n        \"handle\"\n    ],\n    // (Optional) Database WHERE clauses allowing\
        \ you to granularly filter down or search for messages.\n    // This should\
        \ follow TypeORM's WHERE expression query builder.\n    // Reference: https://typeorm.io/#/select-query-builder/adding-where-expression\n\
        \    \"where\": [\n        {\n            \"statement\": \"message.text =\
        \ :text\",\n            \"args\": {\n                \"text\": \"Hello World!\"\
        \n            }\n        }\n    ],\n    // (Optional) Fetches messages after\
        \ a specified date, represented in seconds since EPOCH\n    \"after\": 0,\n\
        \    // (Optional) Fetches messages before a specified date, represented in\
        \ seconds since EPOCH\n    \"before\": 1633965221,\n    // (Optional) How\
        \ the returned data should be sorted.\n    // Must be one of: `ASC`, `DESC\n\
        \    \"sort\": \"DESC\"\n}\n\n</code></pre>\n"
      operationId: list
      requestBody:
        content:
          application/json:
            schema:
              example:
                chatGuid: ''
                limit: 10
                offset: 0
                sort: DESC
                where:
                - args:
                    text: Kara and Mimi
                  statement: message.text = :text
                with:
                - chat
                - chat.participants
                - attachment
                - handle
                - sms
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Query Messages
      tags:
      - messages
