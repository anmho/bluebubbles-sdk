        \ the \"Send Text\" API endpoint.\n    \"payload\": {\n        \"chatGuid\"\
        : \"iMessage;-;XXXXXXXXXX\",\n        \"message\": \"Good morning!\",\n  \
        \      \"method\": \"private-api\"\n    },\n    // This is a milliseconds-since-epoch\
        \ timestamp.\n    // This represents the time the message should be sent at.\n\
        \    // This must be sometime in the future.\n    \"scheduledFor\": 1668413100000,\n\
        \     // The scheduling configuration.\n     // For a one-time message, this\
        \ is all that is required.\n    \"schedule\": {\n        \"type\": \"recurring\"\
        ,\n        \"intervalType\": \"daily\",\n        \"interval\": 1\n    }\n\
        }\n\n</code></pre>\n"
      operationId: updateAScheduledMessageById
      parameters:
      - *id003
      requestBody:
        content:
          application/json:
            schema:
              example:
                payload:
                  chatGuid: iMessage;-;XXXXXXXXXX
                  message: Good morning!
                  method: private-api
                schedule:
                  type: once
                scheduledFor: 1668413100000
                type: send-message
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Update a Scheduled Message by ID
      tags:
      - messages
  /api/v1/message/text:
    post:
      description: "<p>Send a text message via iMessage</p>\n<p><strong>Minimum BlueBubbles\
        \ Server Version</strong>: 0.3.0</p>\n<p><em><strong>Note</strong>__: the</em>\
        \ <em><code>partIndex</code></em> <em>parameter is only supported on macOS\
        \ BIg Sur and newer, and requires BlueBubbles Server v1.4.0</em></p>\n<p><em><strong>Note</strong>__:\
        \ This endpoint conditionally uses the Private API if certain parameters are\
        \ present. Here are the parameters that will use the Private API:</em></p>\n\
        <ul>\n<li><em>method: private-api</em></li>\n<li><em>subject</em></li>\n<li><em>effectId</em></li>\n\
        <li><em>selectedMessageGuid</em></li>\n</ul>\n<h4 id=\"request-body\">Request\
        \ Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"><code\
        \ class=\"language-json\">{\n    // The GUID for the Chat you want this message\
        \ to be sent to\n    \"chatGuid\": \"iMessage;+;xxxxxxxxxxxx\",\n    // A\
        \ unique identifier for the message.\n    // This is to prevent duplicate\
        \ messages from being sent.\n    \"tempGuid\": \"\",\n    // The text message\
        \ to send\n    \"message\": \"Hello World!\",\n    // (Optional) Method to\
        \ send the message using. Must be one of: `apple-script`, `private-api`. Default:\
        \ `apple-script`.\n    \"method\": \"apple-script\",\n    // (Optional) Send\
        \ a subject with the message.\n    // Setting this will force the method to\
        \ be `private-api`, so you must have the Private API setup.\n    \"subject\"\
        : \"\",\n    // (Optional) Send a message using an effect.\n    // Setting\
        \ this will force the method to be `private-api`, so you must have the Private\
        \ API setup.\n    \"effectId\": \"\",\n    // (Optional) Reply to another\
        \ message by GUID.\n    // Setting this will force the method to be `private-api`,\
        \ so you must have the Private API setup.\n    \"selectedMessageGuid\": \"\
        \",\n    // The part of the message to reply to.\n    // This is only used\
        \ for replies.\n    // macOS Big Sur and newer.\n    // Optional, defaults\
        \ to 0.\n    // Must be an integer (min: 0)\n    \"partIndex\": 0\n}\n\n</code></pre>\n"
      operationId: sendText
      requestBody:
        content:
          application/json:
            schema:
              example:
                chatGuid: iMessage;+;xxxxxxxxxxxx
                effectId: ''
                message: Hello World!
                method: apple-script
                selectedMessageGuid: ''
                subject: ''
                tempGuid: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Send Text
      tags:
      - messages
