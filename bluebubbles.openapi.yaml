  /api/v1/message/schedule:
    get:
      description: '<p>Gets the messages you currently have scheduled, or have been
        scheduled in the past.</p>

        <p><strong>Minimum BlueBubbles Server Version:</strong> 1.4.0</p>

        '
      operationId: getScheduledMessages
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Scheduled Messages
      tags:
      - messages
    post:
      description: "<p>Schedules a message to be sent at a future time.</p>\n<p>You\
        \ can also schedule messages to be sent on a recurring schedule.</p>\n<p><strong>Minimum\
        \ BlueBubbles Server Version:</strong> 1.4.0</p>\n<p><strong>Payload:</strong>\
        \ This dictionary contains metadata used to send a message. It mimics the\
        \ same parameters as the <code>Send Text</code> API endpoint.</p>\n<p><strong>Action\
        \ Types:</strong></p>\n<ul>\n<li>send-message</li>\n</ul>\n<p><strong>Schedule\
        \ Types:</strong></p>\n<ul>\n<li>once</li>\n<li>recurring</li>\n</ul>\n<p><strong>Schedule\
        \ Interval Types:</strong></p>\n<ul>\n<li>hourly</li>\n<li>daily</li>\n<li>weekly</li>\n\
        <li>monthly</li>\n<li>yearly</li>\n</ul>\n<h4 id=\"request-body-one-time\"\
        >Request Body (One-time):</h4>\n<p><strong>Note:</strong> If a one-time message\
        \ is missed -- for instance, if the server went down during the time it was\
        \ supposed to send -- the message will <em>not</em> be sent.</p>\n<pre class=\"\
        click-to-expand-wrapper is-snippet-wrapper\"><code class=\"language-json\"\
        >{\n    \"type\": \"send-message\",\n    // The message data to send at the\
        \ scheduled time.\n    // This mimics the \"Send Text\" API endpoint.\n  \
        \  \"payload\": {\n        \"chatGuid\": \"iMessage;-;XXXXXXXXXX\",\n    \
        \    \"message\": \"Good morning!\",\n        \"method\": \"private-api\"\n\
        \    },\n    // This is a milliseconds-since-epoch timestamp.\n    // This\
        \ represents the time the message should be sent at.\n    // This must be\
        \ sometime in the future.\n\n    \"scheduledFor\": 1668413100000,\n     //\
        \ The scheduling configuration.\n     // For a one-time message, this is all\
        \ that is required.\n\n    \"schedule\": {\n        \"type\": \"once\"\n \
        \   }\n}\n\n</code></pre>\n<h4 id=\"request-body-recurring\">Request Body\
        \ (Recurring):</h4>\n<p><strong>Note:</strong> When the first <code>scheduledFor</code>\
        \ time is reached, the next scheduled for time will be calculated before the\
        \ message is sent. This is to ensure that recurring messages are sent at a\
        \ consistent time.</p>\n<p><strong>Note:</strong> If a recurring message is\
        \ missed -- for instance if the server was offline when the message was scheduled\
        \ to be sent -- it will not send, and will be rescheduled for the next time\
        \ the recurring interval occurs. This will also ensure that recurring messages\
        \ are sent at a consistent time.</p>\n<pre class=\"click-to-expand-wrapper\
        \ is-snippet-wrapper\"><code class=\"language-json\">{\n    \"type\": \"send-message\"\
        ,\n    // The message data to send at the scheduled time.\n    // This mimics\
        \ the \"Send Text\" API endpoint.\n    \"payload\": {\n        \"chatGuid\"\
        : \"iMessage;-;XXXXXXXXXX\",\n        \"message\": \"Good morning!\",\n  \
        \      \"method\": \"private-api\"\n    },\n    // This is a milliseconds-since-epoch\
        \ timestamp.\n    // This represents the time the message should be sent at.\n\
        \    // This must be sometime in the future.\n\n    \"scheduledFor\": 1668413100000,\n\
        \     // The scheduling configuration.\n     // For a one-time message, this\
        \ is all that is required.\n\n    \"schedule\": {\n        \"type\": \"recurring\"\
        ,\n        \"intervalType\": \"daily\",\n        \"interval\": 1\n\n    }\n\
        }\n\n</code></pre>\n"
      operationId: scheduleAMessage
      requestBody:
        content:
          application/json:
            schema:
              example:
                payload:
                  chatGuid: iMessage;-;XXXXXXXXXX
                  message: Good morning!
                  method: private-api
                schedule:
                  type: once
                scheduledFor: 1668413100000
                type: send-message
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Schedule a Message
      tags:
      - messages
