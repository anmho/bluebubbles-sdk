info:
  description: '<html><head></head><body><p>This is the API Documentation for the
    BlueBubbles Server App''s REST API.</p>

    <h2 id="what-is-bluebubbles">What is BlueBubbles</h2>

    <p>BlueBubbles is a cross-platform app ecosystem aimed to bring iMessage to all
    your devices. This means, as long as you have a macOS device/deployment running
    the BlueBubbles Server App, you''ll be able to send and receive iMessages.</p>

    <h2 id="what-does-this-api-offer">What does this API offer?</h2>

    <p>This API offers abilities to store backups of settings/themes, as well as interacting
    with the underlying macOS device. You''ll be able to fetch chats, messages, attachments,
    handles, as well as receive notifications via sockets (Socket.IO; I want to change
    this in the future...)</p>

    </body></html>'
  title: BlueBubbles
  version: 1.0.0
openapi: 3.0.0
paths:
  /:
    get:
      description: '<p>Get the server''s landing page (index.html)</p>

        '
      operationId: getLandingPage
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Landing Page
      tags:
      - web
  /ap/v1/icloud/account/alias:
    post:
      description: '<p><strong>Private API Only</strong></p>

        <p>Change which iCloud address you send iMessages from. If you have multiple
        aliases for your iCloud account setup, you can choose one specifically to
        send messages from. By default, it''s your original Apple ID.</p>

        <p>If the alias you provide is not a vetted (approved) alias, this call will
        throw an error.</p>

        '
      operationId: modifyActiveAlias
      requestBody:
        content:
          application/json:
            schema:
              example:
                alias: jdoe@gmail.com
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Modify Active Alias
      tags:
      - icloud
  /api/v1/attachment/count:
    get:
      description: '<p>Fetch the total number of attachments for your iMessage account
        (on the device)</p>

        '
      operationId: getAttachmentCount
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Attachment Count
      tags:
      - attachments
  /api/v1/attachment/upload:
    post:
      description: "<p>Upload an attachment to the server's iMessage attachments directory.</p>\n\
        <p>This is a pre-requisite and <em>must</em> be done before sending an attachment\
        \ as part of a <em>multipart</em> message. This is <strong>not</strong> required\
        \ when sending a normal attachment.</p>\n<p>The response of this endpoint\
        \ will be a unique identifier that you can use when sending a <em>multipart</em>\
        \ message.</p>\n<h4 id=\"example-response\">Example Response</h4>\n<pre class=\"\
        click-to-expand-wrapper is-snippet-wrapper\"><code class=\"language-json\"\
        >{\n    \"status\": 200,\n    \"message\": \"Success\",\n    \"data\": {\n\
        \        \"hash\": \"a04a23a0833b33db8a63ee0816948786\"\n    }\n}\n\n</code></pre>\n"
      operationId: uploadAttachment
      requestBody:
        content: {}
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Upload Attachment
      tags:
      - attachments
  /api/v1/attachment/{guid}:
    get:
      description: '<p>Fetch an Attachment''s database information by ID</p>

        '
      operationId: get
      parameters:
      - &id001
        in: path
        name: guid
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Attachment by GUID
      tags:
      - attachments
  /api/v1/attachment/{guid}/blurhash:
    get:
      description: '<p>Generates a BlurHash string based on the given Attachment (by
        ID). You may optionally resize the image before the BlurHash is generated.</p>

        <p><strong>Note</strong>: Calculating a BlurHash is fairly intensive. Resizing
        the image to smaller size by specifying and/or height will reduce the time
        it takes to generate the hash string.</p>

        '
      operationId: getAttachmentBlurhash
      parameters:
      - *id001
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Attachment Blurhash
      tags:
      - attachments
  /api/v1/attachment/{guid}/download:
    get:
      description: '<p>Download an iMessage Attachment by ID. You may optionally specify
        height/width parameters to resize the image.</p>

        '
      operationId: download
      parameters:
      - *id001
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Download Attachment
      tags:
      - attachments
  /api/v1/attachment/{guid}/download/force:
    get:
      description: '<p><strong>Private API Required</strong></p>

        <p>Force download an iMessage Attachment by ID. You may optionally specify
        height/width parameters to resize the image.</p>

        <p>This is different from the regular download endpoint as this will force
        the attachment to download if it''s not already downloaded on the Mac. If
        an image isn''t already downloaded on the Mac, and you use the regular download
        endpoint, you''ll receive a 404 not found.</p>

        '
      operationId: forceDownloadAttachment
      parameters:
      - *id001
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Force Download Attachment
      tags:
      - attachments
  /api/v1/attachment/{guid}/live:
    get:
      description: '<p>Get''s an attachment''s "live photo" (if available).</p>

        <p>If an attachment is not an image or does not have a live version, this
        endpoint will return an error indicating that a live photo does not exist
        for the attachment.</p>

        '
      operationId: getAttachmentLivePhoto
      parameters:
      - *id001
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Attachment Live Photo
      tags:
      - attachments
  /api/v1/backup/settings:
    delete:
      description: "<p>Deletes a settings backup by name.</p>\n<h4 id=\"request-body\"\
        >Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // The name of your settings\n    \"\
        name\": \"SettingsBackup - 2021/10/11\"\n}\n\n</code></pre>\n"
      operationId: deleteSettings
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Delete Settings
      tags:
      - backups
    get:
      description: '<p>Fetches settings saved to your BlueBubbles Server.</p>

        '
      operationId: getSettings
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Settings
      tags:
      - backups
    post:
      description: "<p>Save a Settings configuration to your BlueBubbles Server App.\
        \ This request has 2 required fields, <code>name</code> and <code>data</code>.\
        \ Otherwise, the actual configuration data is up to the client. The only caveat\
        \ is that clients that are pulling settings from the server need to be able\
        \ to understand the format.</p>\n<h4 id=\"request-body\">Request Body</h4>\n\
        <pre class=\"click-to-expand-wrapper is-snippet-wrapper\"><code class=\"language-json\"\
        >{\n    // The name of your settings\n    \"name\": \"SettingsBackup - 2021/10/11\"\
        ,\n    // The configuration data for your settings\n    \"data\": {}\n}\n\n\
        </code></pre>\n"
      operationId: saveSettings
      requestBody:
        content:
          application/json:
            schema:
              example:
                data: {}
                name: SettingsBackup - 2021/10/11
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Save Settings
      tags:
      - backups
  /api/v1/backup/theme:
    delete:
      description: "<p>Deletes a theme backup by name.</p>\n<h4 id=\"request-body\"\
        >Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // The name of your theme\n    \"name\"\
        : \"SettingsBackup - 2021/10/11\"\n}\n\n</code></pre>\n"
      operationId: deleteTheme
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Delete Theme
      tags:
      - backups
    get:
      description: '<p>Fetches themes saved to your BlueBubbles Server.</p>

        '
      operationId: getThemes
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Themes
      tags:
      - backups
    post:
      description: "<p>Save a Theme to your BlueBubbles Server App. This request has\
        \ 2 required fields, <code>name</code> and <code>data</code>. Otherwise, the\
        \ actual configuration data is up to the client. The only caveat is that clients\
        \ that are pulling themes from the server need to be able to understand the\
        \ format.</p>\n<h4 id=\"request-body\">Request Body</h4>\n<pre class=\"click-to-expand-wrapper\
        \ is-snippet-wrapper\"><code class=\"language-json\">{\n    // The name of\
        \ your theme\n    \"name\": \"OLED Dark\",\n\n    // The configuration data\
        \ for your theme\n    \"data\": {}\n}\n</code></pre>\n"
      operationId: saveTheme
      requestBody:
        content:
          application/json:
            schema:
              example:
                data: {}
                name: OLED Dark
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Save Theme
      tags:
      - backups
  /api/v1/chat/count:
    get:
      description: '<p>Get the total number of chats for your iMessage account (on
        the device)</p>

        '
      operationId: getChatCount
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Chat Count
      tags:
      - chats
  /api/v1/chat/new:
    post:
      description: "<p>Create a new iMessage chat</p>\n<p><strong>Minimum BlueBubbles\
        \ Server Version</strong>: 0.3.0</p>\n<p><strong>Requires:</strong> Private\
        \ API</p>\n<h4 id=\"request-body\">Request Body</h4>\n<pre class=\"click-to-expand-wrapper\
        \ is-snippet-wrapper\"><code class=\"language-json\">{\n    // A list of participants\
        \ for the chat\n    \"addresses\": [],\n    // (Optional) A message to send\
        \ in the new chat\n    \"message\": \"An optional message to send\"\n}\n</code></pre>\n"
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              example:
                addresses: []
                message: An optional message to send
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Create New Chat
      tags:
      - chats
  /api/v1/chat/query:
    post:
      description: "<p>Query for Chats from the database</p>\n<h4 id=\"request-body\"\
        >Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // (Optional) A number representing\
        \ the offset for the database query.\n    // This is useful for paging through\
        \ data from the database to make database calls return as quick as possible.\n\
        \    // (Default: 0)\n    \"limit\": 1000,\n    //( Optional) A number representing\
        \ the offset for the database query.\n    // This is useful for paging through\
        \ data from the database to make database calls return as quick as possible.\n\
        \    // (Default: 0)\n    \"offset\": 0,\n    // (Optional) What related information\
        \ do you want returned with the messages?\n    // Must be one of: `participants`,\
        \ `lastmessage`, `sms`, `archived`, `message.attributed-body`, `message.message-info-summary`,\
        \ `message.payload-data`\n    \"with\": [\n        \"lastMessage\",\n    \
        \    \"participants\",\n        \"sms\",\n        \"archived\"\n    ],\n \
        \   // (Optional) How the returned data should be sorted.\n    // In order\
        \ to sort, `lastmessage` must be included in the `with` parameter.\n    //\
        \ Must be: `lastmessage`\n    \"sort\": \"lastmessage\"\n}\n\n</code></pre>\n"
      operationId: list
      requestBody:
        content:
          application/json:
            schema:
              example:
                limit: 1000
                offset: 0
                sort: lastmessage
                with:
                - lastMessage
                - sms
                - archived
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Query Chats
      tags:
      - chats
  /api/v1/chat/{chatGuid}:
    delete:
      description: '<p>Deletes a chat from the iMessage client on the macOS server.
        This will only apply to the macOS server''s iMessage client, and no other
        Apple devices.</p>

        <p><strong>Minimum BlueBubbles Server Version</strong>: 1.3.0</p>

        <p><strong>Requires:</strong> Private API</p>

        <h4 id="request-body">Request Body</h4>

        <p>N/A</p>

        '
      operationId: deleteChat
      parameters:
      - &id002
        in: path
        name: chatGuid
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Delete Chat
      tags:
      - chats
    get:
      description: '<p>Fetches a group chat''s Icon. This will only return an icon
        if the group has one set, and if they have set it at somepoint <em>after</em>
        the inception of the macOS host.</p>

        '
      operationId: get
      parameters:
      - *id002
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Chat Icon by GUID
      tags:
      - chats
    put:
      description: "<p>Updates an existing chat</p>\n<p><strong>Minimum BlueBubbles\
        \ Server Version</strong>: 0.3.0</p>\n<p><strong>Requires:</strong> Private\
        \ API</p>\n<h4 id=\"request-body\">Request Body</h4>\n<pre class=\"click-to-expand-wrapper\
        \ is-snippet-wrapper\"><code class=\"language-json\">{\n    // (Optional)\
        \ A new name for a group chat\n    \"displayName\": \"\"\n}\n</code></pre>\n"
      operationId: updateAChat
      parameters:
      - *id002
      requestBody:
        content:
          application/json:
            schema:
              example:
                displayName: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Update a Chat
      tags:
      - chats
  /api/v1/chat/{chatGuid}/icon:
    delete:
      description: '<p>Removes/Unsets a group chat''s icon/photo.</p>

        <p><strong>Requires:</strong> Private API</p>

        '
      operationId: removeGroupIcon
      parameters:
      - *id002
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Remove Group Icon
      tags:
      - chats
    post:
      description: '<p>Set a group chat''s icon/photo.</p>

        <p><strong>Requires:</strong> Private API</p>

        '
      operationId: setGroupIcon
      parameters:
      - *id002
      requestBody:
        content: {}
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Set Group Icon
      tags:
      - chats
  /api/v1/chat/{chatGuid}/leave:
    post:
      description: '<p>Allows you to leave a group chat that you are in.</p>

        <p>An error will be thrown if the chat you are trying to leave is not a group
        chat.</p>

        <p><strong>Requires:</strong> Private API</p>

        '
      operationId: leaveChat
      parameters:
      - *id002
      requestBody:
        content:
          application/json:
            schema:
              example: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Leave Chat
      tags:
      - chats
  /api/v1/chat/{chatGuid}/message:
    get:
      description: '<p>Fetch messages associated with a specified chat</p>

        '
      operationId: listMessages
      parameters:
      - *id002
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Chat Messages
      tags:
      - chats
  /api/v1/chat/{chatGuid}/participant:
    delete:
      description: "<p>Removes a participant from an existing chat</p>\n<p><strong>Minimum\
        \ BlueBubbles Server Version</strong>: 0.3.0</p>\n<p><strong>Requires:</strong>\
        \ Private API</p>\n<h4 id=\"request-body\">Request Body</h4>\n<pre class=\"\
        click-to-expand-wrapper is-snippet-wrapper\"><code class=\"language-json\"\
        >{\n    // The participant address to remove\n    \"address\": \"\"\n}\n</code></pre>\n"
      operationId: removeParticipantFromChat
      parameters:
      - *id002
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Remove Participant from Chat
      tags:
      - chats
    post:
      description: "<p>Adds a participant to an existing chat.</p>\n<p>Include the\
        \ country code (if possible). For instance, the country code for the United\
        \ States is <code>+1</code>, so include a <code>1</code> at the start of the\
        \ phone number from the US.</p>\n<p><strong>Minimum BlueBubbles Server Version</strong>:\
        \ 0.3.0</p>\n<p><strong>Requires:</strong> Private API</p>\n<h4 id=\"request-body\"\
        >Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // The participant address to add\n\
        \    \"address\": \"\"\n}\n\n</code></pre>\n"
      operationId: addParticipantToChat
      parameters:
      - *id002
      requestBody:
        content:
          application/json:
            schema:
              example:
                address: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Add Participant to Chat
      tags:
      - chats
  /api/v1/chat/{chatGuid}/read:
    post:
      description: '<p>Marks a chat as read. This will also dispatch an event to other
        BlueBubbles clients indicating the chat should be marked read.</p>

        <p><strong>Minimum BlueBubbles Server Version</strong>: 1.1.0</p>

        <p><strong>Requires:</strong> Private API</p>

        <h4 id="request-body">Request Body</h4>

        <p>N/A</p>

        '
      operationId: markRead
      parameters:
      - *id002
      requestBody:
        content:
          application/json:
            schema:
              example: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Mark Chat as Read
      tags:
      - chats
  /api/v1/chat/{chatGuid}/share/contact:
    post:
      description: '<p>Allows you to share your own iCloud Contact Card with another
        chat.</p>

        '
      operationId: shareContactInfo
      parameters:
      - *id002
      requestBody:
        content:
          application/json:
            schema:
              example: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Share Contact Info
      tags:
      - chats
  /api/v1/chat/{chatGuid}/share/contact/status:
    get:
      description: '<p>Fetch messages associated with a specified chat</p>

        '
      operationId: getContactShareStatus
      parameters:
      - *id002
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Contact Share Status
      tags:
      - chats
  /api/v1/chat/{chatGuid}/typing:
    delete:
      description: '<p>Allows you to stop sending typing indicators to a chat</p>

        <p><strong>Requires:</strong> Private API</p>

        <p><strong>Note:</strong> Typing indicators will automatically stop when you
        send a message to the specified chat.</p>

        '
      operationId: stopSendTypingIndicator
      parameters:
      - *id002
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Stop Send Typing Indicator
      tags:
      - chats
    post:
      description: '<p>Allows you to start sending typing indicators to a chat</p>

        <p><strong>Requires:</strong> Private API</p>

        <p><strong>Note:</strong> Typing indicators will automatically stop when you
        send a message to the specified chat.</p>

        '
      operationId: startSendTypingIndicator
      parameters:
      - *id002
      requestBody:
        content: {}
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Start Send Typing Indicator
      tags:
      - chats
  /api/v1/chat/{chatGuid}/unread:
    post:
      description: '<p>Marks a chat as unread. This will also dispatch an event to
        other BlueBubbles clients indicating the chat should be marked unread.</p>

        <p>If you are not running macOS Ventura and send this API request, the event
        will still be dispatched to other BlueBubbles clients. However, it will not
        be marked as unread "officially" for other iOS devices.</p>

        <p><strong>Minimum BlueBubbles Server Version</strong>: 1.4.0</p>

        <p><strong>Requires:</strong></p>

        <ul>

        <li>Private API</li>

        <li>macOS Ventura</li>

        </ul>

        <h4 id="request-body">Request Body</h4>

        <p>N/A</p>

        '
      operationId: markChatAsUnread
      parameters:
      - *id002
      requestBody:
        content:
          application/json:
            schema:
              example: ''
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Mark Chat as Unread
      tags:
      - chats
  /api/v1/contact:
    get:
      description: '<p>Fetch contacts from your macOS device</p>

        '
      operationId: getContacts
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Contacts
      tags:
      - contacts
  /api/v1/contact/query:
    post:
      description: "<p>Query your contacts from your macOS device.</p>\n<h4 id=\"\
        request-body\">Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // (Optional) A list of one or more\
        \ addresses to return data for\n    \"addresses\": []\n}\n</code></pre>\n"
      operationId: queryContacts
      requestBody:
        content:
          application/json:
            schema:
              example:
                addresses: []
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Query Contacts
      tags:
      - contacts
  /api/v1/fcm/client:
    get:
      description: '<p>Fetches your Server''s FCM Client Configuration so you can
        register your device with Google Firebase.</p>

        '
      operationId: getFcmClientConfig
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get FCM Client Config
      tags:
      - fcm
  /api/v1/fcm/device:
    post:
      description: "<p>Registers a device for Google FCM Notifications</p>\n<h4 id=\"\
        request-body\">Request Body</h4>\n<pre class=\"click-to-expand-wrapper is-snippet-wrapper\"\
        ><code class=\"language-json\">{\n    // A name for the device you are registering\n\
        \    \"name\": \"pixel5a\",\n    // A unique identifier string that Google\
        \ FCM will use to send notifications to your device.\n    // This is typically\
        \ generated when you authenticate with Google FCM.\n    \"identifier\": \"\
        \"\n}\n</code></pre>\n"
      operationId: registerDevice
      requestBody:
        content:
          application/json:
            schema:
              example:
                identifier: ''
                name: pixel5a
              type: object
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Register Device
      tags:
      - fcm
  /api/v1/handle/<address>/focus:
    get:
      description: '<p>Get the handle''s focus mode status.</p>

        <p>Return values include:</p>

        <ul>

        <li>unknown</li>

        <li>silenced</li>

        <li>none</li>

        </ul>

        '
      operationId: getHandle'sFocusStatus
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Get Handle's Focus Status
