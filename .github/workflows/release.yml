name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci

      - name: Import npm token from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          namespace: ${{ vars.VAULT_NAMESPACE }}
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          role: ${{ vars.VAULT_GITHUB_ROLE }}
          secrets: |
            ${{ vars.VAULT_NPM_TOKEN_SECRET_PATH }} ${{ vars.VAULT_NPM_TOKEN_SECRET_KEY }} | NODE_AUTH_TOKEN

      - name: Verify Vault token injection
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NODE_AUTH_TOKEN is empty. Verify Vault role, secret path/key, and repo variables."
            exit 1
          fi

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release:publish
          title: "chore(release): version package"
          commit: "chore(release): version package"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
